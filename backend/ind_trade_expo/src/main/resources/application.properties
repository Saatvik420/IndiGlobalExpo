# --- APPLICATION CONFIGURATION ---
spring.application.name=ind_trade_expo
server.port=${PORT:5000}

# --- MONGODB CONFIGURATION ---
# Using Environment Variables (Best Practice)
spring.data.mongodb.uri=${MONGO_URI:mongodb+srv://saatvik:saatvik@cluster0.8xfbzhz.mongodb.net/trade_expo?retryWrites=true&w=majority}
