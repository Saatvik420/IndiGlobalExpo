# --- APPLICATION CONFIGURATION ---
spring.application.name=ind_trade_expo
server.port=${PORT:5000}

# --- MONGODB CONFIGURATION ---
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=trade_expo

# --- SECURITY & JWT ---
ind_trade_expo.jwtSecret=${JWT_SECRET}
ind_trade_expo.jwtExpirationMs=86400000

# --- CORS CONFIGURATION ---
ind_trade_expo.allowedOrigins=${ALLOWED_ORIGINS}

# --- STRIPE CONFIGURATION ---
stripe.api.key=${STRIPE_API_KEY}

# --- LOGGING ---
logging.level.org.springframework.web=INFO
logging.level.com.india_trade_expo.ind_trade_expo=DEBUG
